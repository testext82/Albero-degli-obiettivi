<!-- Albero degli Obiettivi — app standalone completa -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Albero degli Obiettivi</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><line x1='50' y1='88' x2='50' y2='44' stroke='%233E7D4A' stroke-width='6' stroke-linecap='round'/><path d='M50 66 Q40 60 32 47' fill='none' stroke='%233E7D4A' stroke-width='5' stroke-linecap='round'/><path d='M50 62 Q60 56 68 45' fill='none' stroke='%233E7D4A' stroke-width='5' stroke-linecap='round'/><circle cx='30' cy='45' r='6' fill='%233E7D4A'/><circle cx='70' cy='43' r='6' fill='%233E7D4A'/><circle cx='50' cy='32' r='12' fill='%235C9A56'/><path d='M44 32 L48.5 37 L57 27' fill='none' stroke='%23EAF3DE' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:#EEF2E9; --card:#F8FAF4; --ink:#1B2620;
    --pine:#2F5541; --pine-2:#3E6B4A; --moss:#6E9A4E; --moss-3:#E4EED4;
    --clay:#A8543A; --stone:#7C8A7E; --line:#CBD6C4;
    --amber:#C98A2B; --red:#C0392B;
    --shadow:0 1px 2px rgba(27,38,32,.05),0 8px 24px rgba(27,38,32,.06);
    --radius:14px;
  }
  [data-theme="dark"]{
    --paper:#131A15; --card:#1C2620; --ink:#E7EDE3;
    --pine:#8CC08F; --pine-2:#A6D3A6; --moss:#8BBF63; --moss-3:#26351F;
    --clay:#E08B6E; --stone:#93A395; --line:#2E3B31;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1200px 600px at 15% -10%,color-mix(in srgb,var(--card) 60%,var(--paper)) 0%,transparent 60%),var(--paper);
    color:var(--ink);font-family:"Spline Sans",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;transition:background .2s,color .2s;
  }
  .wrap{max-width:880px;margin:0 auto;padding:26px 18px 120px}

  .brand{display:flex;align-items:center;gap:11px;margin-bottom:16px}
  .brandmark{width:36px;height:36px;flex:0 0 auto}
  .brandname{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:19px;color:var(--pine);letter-spacing:-.01em}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--pine-2);font-weight:600;margin:0 0 8px}
  .tree-name{font-family:"Fraunces",Georgia,serif;font-weight:900;font-size:clamp(24px,5vw,40px);line-height:1.05;
    letter-spacing:-.01em;color:var(--ink);width:100%;border:none;background:transparent;padding:2px 4px;margin:0 0 2px -4px;border-radius:8px}
  .tree-name:hover{background:color-mix(in srgb,var(--pine) 8%,transparent)}
  .tree-name:focus{outline:none;background:color-mix(in srgb,var(--pine) 10%,transparent);box-shadow:inset 0 -2px 0 var(--pine-2)}
  .name-hint{font-size:12px;color:var(--stone);margin:0 0 14px 0}

  .overall{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
  .overall .txt{flex:1 1 auto;min-width:0}
  .overall .txt b{font-weight:600}
  .overall .txt span{color:var(--stone);font-size:13.5px}

  /* selettore alberi */
  .trees{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:16px 0 4px}
  select,.sellike{font:inherit;font-size:13.5px;color:var(--ink);background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:8px 11px}
  select:focus{outline:2px solid var(--pine-2);outline-offset:1px}

  .chip{font:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--pine);border-radius:999px;padding:8px 12px;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s}
  .chip:hover{background:color-mix(in srgb,var(--pine) 8%,var(--card));border-color:color-mix(in srgb,var(--pine) 25%,var(--line))}
  .chip svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .chip.danger{color:var(--clay)} .chip.danger:hover{background:color-mix(in srgb,var(--clay) 8%,var(--card))}
  .chip.on{background:var(--pine);color:var(--paper);border-color:var(--pine)}
  .chip.icon{padding:8px}

  .bargroup{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0}
  .bargroup .sep{width:1px;height:22px;background:var(--line);margin:0 2px}
  .search{position:relative;flex:1 1 180px;min-width:150px}
  .search input{width:100%;font:inherit;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px 8px 32px}
  .search input:focus{outline:2px solid var(--pine-2);outline-offset:1px;border-color:transparent}
  .search svg{position:absolute;left:10px;top:9px;width:15px;height:15px;fill:none;stroke:var(--stone);stroke-width:2}

  .composer{display:flex;gap:10px;margin:16px 0 6px}
  .composer input{flex:1;font:inherit;font-size:16px;color:var(--ink);background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;box-shadow:var(--shadow)}
  .composer input::placeholder{color:var(--stone)}
  .composer input:focus{outline:2px solid var(--pine-2);outline-offset:1px;border-color:transparent}
  .btn{font:inherit;font-weight:600;cursor:pointer;border:none;border-radius:12px;padding:13px 18px;white-space:nowrap;
    background:var(--pine);color:var(--paper);transition:transform .06s,background .15s}
  .btn:hover{background:var(--pine-2)} .btn:active{transform:translateY(1px)}

  ul.tree,ul.tree ul{list-style:none;margin:0;padding:0}
  ul.tree{margin-top:10px}
  ul.tree ul{margin-left:20px;position:relative}
  ul.tree ul::before{content:"";position:absolute;top:4px;bottom:16px;left:0;width:2px;background:var(--line);border-radius:2px}
  li.node{position:relative}
  li.node>ul>li::before{content:"";position:absolute;left:-20px;top:22px;width:16px;height:2px;background:var(--line);border-radius:2px}

  .row{display:flex;align-items:flex-start;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:11px 12px;margin:6px 0;box-shadow:var(--shadow);position:relative}
  .row.done{background:var(--moss-3);border-color:color-mix(in srgb,var(--moss) 35%,var(--line))}
  .row.accent{border-left:5px solid var(--accent);background:color-mix(in srgb,var(--accent) 9%,var(--card))}
  .row.accent.done{background:color-mix(in srgb,var(--accent) 9%,var(--moss-3))}
  .node.root>.row .label{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:18px}
  .row.drop-inside{outline:2px dashed var(--pine-2);outline-offset:2px}
  .row.drop-before{box-shadow:0 -3px 0 var(--pine-2),var(--shadow)}
  .row.drop-after{box-shadow:0 3px 0 var(--pine-2),var(--shadow)}
  .row.dragging{opacity:.45}
  .grip{flex:0 0 auto;cursor:grab;color:var(--stone);margin-top:2px;user-select:none;touch-action:none}
  .grip svg{width:14px;height:20px;fill:currentColor;opacity:.5}
  .grip:active{cursor:grabbing}

  .check{flex:0 0 auto;margin-top:1px;width:24px;height:24px;cursor:pointer;border:2px solid var(--pine-2);border-radius:50%;
    background:transparent;display:grid;place-items:center;padding:0;transition:background .15s,border-color .15s}
  .check svg{width:14px;height:14px;stroke:var(--paper);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .12s}
  .check.on{background:var(--moss);border-color:var(--moss)} .check.on svg{opacity:1}
  .check.partial{border-color:var(--moss);background:linear-gradient(90deg,var(--moss) 0 50%,transparent 50% 100%)}

  .body{flex:1 1 auto;min-width:0}
  .toggle{background:none;border:none;padding:0;margin-right:6px;cursor:pointer;color:var(--stone);font-size:12px;width:14px;display:inline-block;transition:transform .15s}
  .toggle.collapsed{transform:rotate(-90deg)}
  .label{font-size:16px;color:var(--ink);word-break:break-word;cursor:text;padding:1px 2px;border-radius:6px}
  .row.done .label{color:var(--stone);text-decoration:line-through;text-decoration-color:var(--moss)}
  .label:hover{background:color-mix(in srgb,var(--pine) 7%,transparent)}
  mark{background:#ffe58a;color:inherit;border-radius:3px;padding:0 1px}
  .edit-input{font:inherit;font-size:16px;width:100%;color:var(--ink);border:none;border-bottom:2px solid var(--pine-2);background:transparent;padding:1px 2px}
  .edit-input:focus{outline:none}

  .meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
  .bar{flex:0 0 92px;height:6px;background:var(--line);border-radius:6px;overflow:hidden}
  .node.root>.row .bar{flex-basis:130px;height:8px}
  .bar>i{display:block;height:100%;background:var(--moss);border-radius:6px;transition:width .25s}
  .frac{font-size:12.5px;color:var(--stone);font-variant-numeric:tabular-nums}
  .pill{font-size:11px;font-weight:600;border-radius:999px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px;border:1px solid transparent}
  .pill.pri-alta{color:#fff;background:var(--red)} .pill.pri-media{color:#fff;background:var(--amber)} .pill.pri-bassa{color:var(--paper);background:var(--pine-2)}
  .pill.due{background:color-mix(in srgb,var(--stone) 18%,var(--card));color:var(--ink);border-color:var(--line)}
  .pill.due.soon{background:color-mix(in srgb,var(--amber) 22%,var(--card));color:var(--ink);border-color:color-mix(in srgb,var(--amber) 45%,var(--line))}
  .pill.due.over{background:color-mix(in srgb,var(--red) 20%,var(--card));color:var(--ink);border-color:color-mix(in srgb,var(--red) 45%,var(--line))}
  .pill.due svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2}
  .tag{font-size:11px;background:color-mix(in srgb,var(--pine) 12%,var(--card));color:var(--pine);border-radius:6px;padding:1px 7px}
  .badge{font-size:11.5px;color:var(--stone);display:inline-flex;align-items:center;gap:3px}
  .badge svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}
  .note-inline{margin-top:7px;font-size:13.5px;color:var(--stone);white-space:pre-wrap;word-break:break-word;cursor:text;
    border-left:3px solid color-mix(in srgb,var(--pine) 25%,var(--line));padding:2px 0 2px 9px;
    display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
  .note-inline a{color:var(--pine);text-decoration:underline}
  .att-inline{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .attchip{font:inherit;font-size:12px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--pine);
    border-radius:8px;padding:4px 9px;display:inline-flex;align-items:center;gap:5px;max-width:220px}
  .attchip:hover{background:color-mix(in srgb,var(--pine) 8%,var(--card));border-color:color-mix(in srgb,var(--pine) 30%,var(--line))}
  .attchip svg{width:13px;height:13px;flex:0 0 auto;fill:none;stroke:currentColor;stroke-width:2}
  .attchip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .drag-float{position:fixed;z-index:80;pointer-events:none;background:var(--pine);color:var(--paper);font-size:13px;
    padding:6px 12px;border-radius:9px;box-shadow:var(--shadow);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.95}

  .actions{flex:0 0 auto;display:flex;gap:2px;align-items:center}
  .iconbtn{width:32px;height:32px;border:none;background:none;cursor:pointer;border-radius:9px;color:var(--stone);display:grid;place-items:center;transition:background .12s,color .12s}
  .iconbtn:hover{background:color-mix(in srgb,var(--pine) 8%,transparent);color:var(--pine)}
  .iconbtn.del:hover{background:color-mix(in srgb,var(--clay) 12%,transparent);color:var(--clay)}
  .iconbtn.active{color:var(--pine);background:color-mix(in srgb,var(--pine) 12%,transparent)}
  .iconbtn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .drawer{margin:2px 0 10px 0;background:color-mix(in srgb,var(--card) 70%,var(--paper));border:1px solid var(--line);border-radius:12px;padding:14px}
  .drawer h4{margin:14px 0 8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--pine-2);font-weight:600}
  .drawer h4:first-child{margin-top:0}
  .fields{display:flex;flex-wrap:wrap;gap:14px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--stone);font-weight:600}
  .field input,.field select{font:inherit;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 10px}
  .swatches{display:flex;flex-wrap:wrap;gap:8px}
  .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid rgba(0,0,0,.08)}
  .swatch.sel{outline:2px solid var(--ink);outline-offset:2px}
  .swatch.none{background:var(--card);display:grid;place-items:center;color:var(--stone)}
  .swatch.none svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tagchip{font-size:12px;background:color-mix(in srgb,var(--pine) 12%,var(--card));color:var(--pine);border-radius:7px;padding:3px 8px;display:inline-flex;align-items:center;gap:5px}
  .tagchip button{border:none;background:none;color:inherit;cursor:pointer;padding:0;font-size:13px;line-height:1}
  .taginput{font:inherit;font-size:13px;border:1px dashed var(--line);background:var(--card);color:var(--ink);border-radius:7px;padding:4px 8px;width:120px}

  .note-view{font-size:14.5px;white-space:pre-wrap;word-break:break-word;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;min-height:20px}
  .note-view a{color:var(--pine);text-decoration:underline}
  .note-view.empty{color:var(--stone);font-style:italic}
  textarea.note{width:100%;font:inherit;font-size:14.5px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;resize:vertical;min-height:70px}
  textarea.note:focus{outline:2px solid var(--pine-2);outline-offset:1px;border-color:transparent}
  .row-right{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}

  .cl-item{display:flex;align-items:center;gap:8px;padding:3px 0}
  .cl-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--moss);cursor:pointer}
  .cl-item span{font-size:14px;flex:1}
  .cl-item span.done{text-decoration:line-through;color:var(--stone)}
  .cl-item button{border:none;background:none;color:var(--stone);cursor:pointer;border-radius:6px;padding:2px 6px}
  .cl-item button:hover{color:var(--clay)}
  .cl-add{display:flex;gap:8px;margin-top:6px}
  .cl-add input{flex:1;font:inherit;font-size:13.5px;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;padding:6px 9px}

  .att-list{display:flex;flex-direction:column;gap:6px;margin:6px 0 10px}
  .att{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:7px 10px}
  .att .ic{flex:0 0 auto;color:var(--pine-2);display:grid;place-items:center}
  .att .ic svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
  .att .nm{flex:1 1 auto;min-width:0;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:none;background:none;text-align:left;cursor:pointer;color:var(--pine)}
  .att .sz{font-size:11.5px;color:var(--stone)}
  .att .x{border:none;background:none;cursor:pointer;color:var(--stone);border-radius:6px;padding:4px}
  .att .x:hover{color:var(--clay)}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .thumbs img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:pointer}

  .drawer-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .mini{font:inherit;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--pine);border-radius:9px;padding:7px 11px;display:inline-flex;align-items:center;gap:6px}
  .mini:hover{background:color-mix(in srgb,var(--pine) 8%,var(--card))}
  .mini svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .mini.wa{color:#1a7f4b} .mini.del{color:var(--clay);margin-left:auto}
  .mvbtns{display:inline-flex;gap:4px}

  .empty{text-align:center;color:var(--stone);padding:46px 20px;border:1.5px dashed var(--line);border-radius:var(--radius);margin-top:12px}
  .empty .big{font-family:"Fraunces",Georgia,serif;font-size:20px;color:var(--pine);margin-bottom:4px}

  footer{margin-top:26px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .muted{color:var(--stone);font-size:12.5px}

  /* modale */
  .modal-bg{position:fixed;inset:0;background:rgba(20,26,21,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
  .modal-bg.show{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:460px;width:100%;padding:22px;box-shadow:var(--shadow);max-height:85vh;overflow:auto}
  .modal h3{font-family:"Fraunces",Georgia,serif;margin:0 0 12px;font-size:22px}
  .modal .close{float:right;border:none;background:none;font-size:20px;cursor:pointer;color:var(--stone)}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .stat{background:color-mix(in srgb,var(--card) 60%,var(--paper));border:1px solid var(--line);border-radius:12px;padding:12px}
  .stat .n{font-family:"Fraunces",Georgia,serif;font-size:26px;font-weight:900;line-height:1}
  .stat .l{font-size:12px;color:var(--stone);margin-top:2px}
  .tpl-list{display:flex;flex-direction:column;gap:8px}
  .tpl{text-align:left;border:1px solid var(--line);background:var(--card);border-radius:11px;padding:11px 13px;cursor:pointer}
  .tpl:hover{border-color:var(--pine-2)}
  .tpl b{display:block;font-size:14.5px} .tpl span{font-size:12.5px;color:var(--stone)}

  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);
    padding:10px 16px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:70}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:560px){.composer{flex-direction:column}.bar{flex-basis:70px}.stat-grid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  /* stampa */
  #printArea{display:none}
  .p-title{font-family:"Fraunces",Georgia,serif;font-size:24px;margin:0 0 4px;color:#1B2620}
  .p-sub{color:#555;font-size:12px;margin:0 0 18px}
  ul.p-tree,ul.p-tree ul{list-style:none;margin:0;padding:0}
  ul.p-tree ul{margin-left:18px;border-left:1px solid #ccc;padding-left:14px}
  .p-item{margin:8px 0;page-break-inside:avoid;color:#1B2620}
  .p-head{font-size:15px;font-weight:600}
  .p-mark{font-weight:700;margin-right:6px}
  .p-tagline{font-size:11px;color:#555;margin:2px 0 0 4px}
  .p-note{font-size:13px;color:#333;margin:3px 0 3px 4px;white-space:pre-wrap;border-left:3px solid #cbd6c4;padding-left:8px}
  .p-att{font-size:12px;color:#444;margin:2px 0 2px 4px}
  .p-img{max-width:320px;max-height:240px;border:1px solid #ddd;border-radius:6px;margin:6px 0}
  @media print{body{background:#fff}body.printing .wrap{display:none}body.printing #printArea{display:block}@page{margin:16mm}}
</style>

<div class="wrap">
  <header>
    <div class="brand">
      <svg class="brandmark" viewBox="0 0 100 100" role="img" aria-label="Logo Albero degli Obiettivi">
        <line x1="50" y1="88" x2="50" y2="44" stroke="#3E7D4A" stroke-width="6" stroke-linecap="round"/>

      <button class="chip" data-g="pdf"><svg viewBox="0 0 24 24"><path d="M6 2h9l5 5v15H6z"/><path d="M9 13h2a1.5 1.5 0 0 0 0-3H9zM9 16v-6"/></svg> PDF</button>
      <button class="chip" data-g="md"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M7 15V9l3 3 3-3v6M17 9v6M15 13l2 2 2-2"/></svg> Markdown</button>
      <button class="chip" data-g="export"><svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M4 21h16"/></svg> Esporta</button>

    <input id="rootInput" type="text" placeholder="Nuovo obiettivo principale… (es. Correre una maratona)" maxlength="200" />

<div id="printArea"></div>
<div id="toast"></div>
<input id="fileInput" type="file" style="display:none" />
<input id="importInput" type="file" accept=".json,application/json" style="display:none" />

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
(function(){
  "use strict";

  const IDX_KEY="albero:index";
  const TREE_PREFIX="albero:tree:";
  const ATT_PREFIX="albero:att:";
  const SET_KEY="albero:settings";
  const CT_KEY="albero:customtpls";
  const MAX_FILE=4*1024*1024;

  let index={currentId:null,trees:[]};      // {currentId, trees:[{id,name}]}
  let cur={id:null,name:"Il mio albero",tree:[]};
  let settings={dark:false,sort:"manuale",lastBackup:null,reminders:false};

  let editingId=null;
  const openSet=new Set();
  let pendingAttId=null, saveTimer=null;
  let view={search:"",filter:"tutti"};
  const undoStack=[], redoStack=[];
  let customTpls=[];   // modelli salvati dall'utente: [{id,name,desc,nodes}]

  const PALETTE=["#2F5541","#6E9A4E","#C98A2B","#A8543A","#7A4E6E","#2E6E6E","#3B4E8C","#B36A7E"];
  const PRI_ORDER={alta:0,media:1,bassa:2,"":3,null:3};

  /* ---------- storage (standalone: localStorage; fallback memoria) ---------- */
  const hasStore=typeof window!=="undefined"&&window.storage&&typeof window.storage.get==="function";
  const hasLS=(()=>{ try{ const k="__t"+Math.random(); localStorage.setItem(k,"1"); localStorage.removeItem(k); return true; }catch(e){ return false; } })();
  const persistent=hasStore||hasLS;
  const mem={};
  async function sGet(k){ if(hasStore){ try{return await window.storage.get(k);}catch(e){return null;} }
    if(hasLS){ const v=localStorage.getItem(k); return v==null?null:{value:v}; }
    return (k in mem)?{value:mem[k]}:null; }
  async function sSet(k,v){ if(hasStore){ try{await window.storage.set(k,v);return true;}catch(e){return false;} }
    if(hasLS){ try{localStorage.setItem(k,v);return true;}catch(e){return false;} }
    mem[k]=v; return true; }
  async function sDel(k){ if(hasStore){ try{await window.storage.delete(k);}catch(e){} return; }
    if(hasLS){ localStorage.removeItem(k); return; } delete mem[k]; }
  async function sList(prefix){
    if(hasStore){ try{ const r=await window.storage.list(prefix); const ks=(r&&r.keys)||[];
      return ks.map(x=>typeof x==="string"?x:(x&&x.key)).filter(Boolean); }catch(e){return [];} }
    if(hasLS){ const o=[]; for(let i=0;i<localStorage.length;i++){ const key=localStorage.key(i); if(key&&key.startsWith(prefix))o.push(key); } return o; }
    return Object.keys(mem).filter(x=>x.startsWith(prefix)); }

  /* ---------- util ---------- */
  const uid=()=> (crypto&&crypto.randomUUID)?crypto.randomUUID():"id-"+Math.random().toString(36).slice(2)+Date.now();
  const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const fmtSize=b=> b<1024?b+" B":b<1048576?(b/1024).toFixed(0)+" KB":(b/1048576).toFixed(1)+" MB";
  function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2300);}
  const todayISO=()=>{const d=new Date();return d.toISOString().slice(0,10);};
  function daysUntil(iso){ if(!iso)return null; const a=new Date(iso+"T00:00:00"), b=new Date(todayISO()+"T00:00:00"); return Math.round((a-b)/86400000); }
  function dueClass(iso){ const d=daysUntil(iso); if(d==null)return""; if(d<0)return"over"; if(d<=3)return"soon"; return""; }
  function fmtDate(iso){ if(!iso)return""; const [y,m,dd]=iso.split("-"); return dd+"/"+m+"/"+y.slice(2); }
  function linkify(text){ const e=esc(text); return e.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>'); }

  function makeNode(text){return{id:uid(),text:(text||"").trim(),done:false,collapsed:false,color:null,note:"",
    priority:null,due:null,tags:[],checklist:[],attachments:[],children:[]};}
  function fill(n){ return {id:n.id||uid(),text:n.text||"",done:!!n.done,collapsed:!!n.collapsed,color:n.color||null,
    note:n.note||"",priority:n.priority||null,due:n.due||null,tags:n.tags||[],checklist:n.checklist||[],
    attachments:n.attachments||[],children:(n.children||[]).map(fill)}; }

  function find(id,nodes=cur.tree,parent=null){ for(const n of nodes){ if(n.id===id) return {node:n,parent,siblings:nodes};
    const d=find(id,n.children,n); if(d) return d; } return null; }
  function progress(n){ if(!n.children.length) return {done:n.done?1:0,total:1};
    let d=0,t=0; for(const c of n.children){const p=progress(c);d+=p.done;t+=p.total;} return {done:d,total:t}; }
  function setSubtree(n,v){ n.done=v; n.children.forEach(c=>setSubtree(c,v)); }
  function normalize(nodes=cur.tree){ for(const n of nodes){ normalize(n.children); if(n.children.length) n.done=n.children.every(c=>c.done); } }
  function collectAttIds(nodes,acc=[]){ for(const n of nodes){ (n.attachments||[]).forEach(a=>acc.push(a.id)); collectAttIds(n.children,acc);} return acc; }
  function isDescendant(ancId,id){ const h=find(ancId); if(!h)return false; const walk=ns=>ns.some(n=>n.id===id||walk(n.children)); return walk(h.node.children); }
  function walkAll(nodes,fn){ nodes.forEach(n=>{fn(n);walkAll(n.children,fn);}); }

  /* ---------- history ---------- */
  function serial(){ return JSON.stringify({name:cur.name,tree:cur.tree}); }
  function pushUndo(){ undoStack.push(serial()); if(undoStack.length>80)undoStack.shift(); redoStack.length=0; }
  function undo(){ if(!undoStack.length){toast("Niente da annullare");return;} redoStack.push(serial());
    const s=JSON.parse(undoStack.pop()); cur.name=s.name; cur.tree=s.tree; editingId=null; render(); saveTree(); toast("Annullato"); }
  function redo(){ if(!redoStack.length){toast("Niente da ripetere");return;} undoStack.push(serial());
    const s=JSON.parse(redoStack.pop()); cur.name=s.name; cur.tree=s.tree; editingId=null; render(); saveTree(); toast("Ripetuto"); }

  /* ---------- persistenza ---------- */
  function scheduleSave(){ const el=document.getElementById("saveState"); if(el) el.textContent="Salvataggio…"; clearTimeout(saveTimer); saveTimer=setTimeout(saveTree,250); }
  async function saveTree(){ const el=document.getElementById("saveState");
    const ok=await sSet(TREE_PREFIX+cur.id,JSON.stringify(cur));
    const it=index.trees.find(t=>t.id===cur.id); if(it&&it.name!==cur.name){it.name=cur.name; await saveIndex(); rebuildTreeSelect();}
    if(el) el.textContent= ok?(persistent?"Tutto salvato":"Salvato in memoria (sessione)"):"Impossibile salvare"; }
  async function saveIndex(){ index.currentId=cur.id; await sSet(IDX_KEY,JSON.stringify(index)); }
  async function saveSettings(){ await sSet(SET_KEY,JSON.stringify(settings)); }
  function commit(){ render(); scheduleSave(); }
  function change(fn){ pushUndo(); fn(); normalize(); commit(); }

  /* ---------- azioni struttura ---------- */
  function addRoot(text){ if(!text.trim())return; change(()=>cur.tree.push(makeNode(text))); }
  function addChild(id){ change(()=>{ const h=find(id); const c=makeNode("Nuovo sotto-obiettivo"); h.node.children.push(c); h.node.collapsed=false; editingId=c.id; }); }
  function toggle(id){ change(()=>{ const h=find(id); setSubtree(h.node,!h.node.done); }); }
  function rename(id,text){ const h=find(id); if(!h)return; if(h.node.text!==text.trim()&&text.trim()){pushUndo(); h.node.text=text.trim();} editingId=null; commit(); }
  function toggleCollapse(id){ const h=find(id); if(!h)return; h.node.collapsed=!h.node.collapsed; commit(); }
  function toggleDetails(id){ openSet.has(id)?openSet.delete(id):openSet.add(id); render(); }
  function setField(id,k,v){ change(()=>{ find(id).node[k]=v; }); }

  async function remove(id){ const h=find(id); if(!h)return; const p=progress(h.node); const many=h.node.children.length>0;
    const msg=many?`Eliminare "${h.node.text||"questo obiettivo"}" e i suoi ${p.total} sotto-obiettivi?`:`Eliminare "${h.node.text||"questo obiettivo"}"?`;
    if(!confirm(msg))return; pushUndo(); const i=h.siblings.indexOf(h.node); h.siblings.splice(i,1); openSet.delete(id); normalize(); commit(); }

  // spostamenti
  function moveSibling(id,dir){ const h=find(id); if(!h)return; const i=h.siblings.indexOf(h.node); const j=i+dir;
    if(j<0||j>=h.siblings.length)return; pushUndo(); const [n]=h.siblings.splice(i,1); h.siblings.splice(j,0,n); commit(); }
  function indent(id){ const h=find(id); if(!h)return; const i=h.siblings.indexOf(h.node); if(i<=0)return;
    pushUndo(); const prev=h.siblings[i-1]; h.siblings.splice(i,1); prev.children.push(h.node); prev.collapsed=false; normalize(); commit(); }
  function outdent(id){ const h=find(id); if(!h||!h.parent)return; pushUndo(); const i=h.siblings.indexOf(h.node); h.siblings.splice(i,1);
    const gp=find(h.parent.id); const target=gp?gp.siblings:cur.tree; const pi=target.indexOf(h.parent); target.splice(pi+1,0,h.node); normalize(); commit(); }
  function moveNode(dragId,targetId,pos){ if(dragId===targetId)return; if(isDescendant(dragId,targetId))return;
    const dh=find(dragId), th=find(targetId); if(!dh||!th)return; pushUndo();
    dh.siblings.splice(dh.siblings.indexOf(dh.node),1);
    if(pos==="inside"){ th.node.children.push(dh.node); th.node.collapsed=false; }
    else{ const arr=th.siblings; const ti=arr.indexOf(th.node); arr.splice(pos==="before"?ti:ti+1,0,dh.node); }
    normalize(); commit(); }

  // checklist
  function clAdd(id,text){ if(!text.trim())return; change(()=>find(id).node.checklist.push({id:uid(),text:text.trim(),done:false})); }
  function clToggle(id,cid){ const h=find(id); const it=h.node.checklist.find(x=>x.id===cid); if(!it)return; pushUndo(); it.done=!it.done; commit(); }
  function clDel(id,cid){ change(()=>{ const h=find(id); h.node.checklist=h.node.checklist.filter(x=>x.id!==cid); }); }
  // tag
  function tagAdd(id,t){ t=t.trim().replace(/^#/,""); if(!t)return; change(()=>{ const h=find(id); if(!h.node.tags.includes(t)) h.node.tags.push(t); }); }
  function tagDel(id,t){ change(()=>{ const h=find(id); h.node.tags=h.node.tags.filter(x=>x!==t); }); }

  /* ---------- allegati ---------- */
  function readFile(f){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej();r.readAsDataURL(f);}); }
  async function addAttachment(id,file){ if(file.size>MAX_FILE){toast("File troppo grande (max 4 MB).");return;}
    const h=find(id); if(!h)return; try{ const data=await readFile(file); const aid=uid();
      if(!await sSet(ATT_PREFIX+aid,data)){toast("Impossibile salvare il documento.");return;}
      pushUndo(); h.node.attachments.push({id:aid,name:file.name,type:file.type||"application/octet-stream",size:file.size}); toast("Documento allegato"); commit();
    }catch(e){toast("Errore nel caricamento");} }
  async function removeAttachment(nodeId,attId){ const h=find(nodeId); if(!h)return; pushUndo();
    h.node.attachments=h.node.attachments.filter(a=>a.id!==attId); toast("Documento rimosso"); commit(); }
  function dataURLtoBlob(dataURL){ const [head,b64]=dataURL.split(","); const mime=(head.match(/:(.*?);/)||[])[1]||"application/octet-stream";
    const bin=atob(b64); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i); return new Blob([arr],{type:mime}); }
  async function openAttachment(attId,name){ const r=await sGet(ATT_PREFIX+attId); if(!r||!r.value){toast("Documento non trovato");return;}
    try{ const url=URL.createObjectURL(dataURLtoBlob(r.value)); const w=window.open(url,"_blank");
      if(!w){ const a=document.createElement("a"); a.href=url; a.download=name||"documento"; a.click(); }
      setTimeout(()=>URL.revokeObjectURL(url),60000);
    }catch(e){ const a=document.createElement("a"); a.href=r.value; a.download=name||"documento"; a.click(); } }
  async function attThumbs(node){ // ritorna html thumbnail per immagini
    const imgs=(node.attachments||[]).filter(a=>/^image\//.test(a.type)); if(!imgs.length)return"";
    let html='<div class="thumbs">'; for(const a of imgs){ const r=await sGet(ATT_PREFIX+a.id); if(r&&r.value) html+=`<img src="${r.value}" data-att="${a.id}" data-name="${esc(a.name)}" data-act="att-open" title="${esc(a.name)}">`; }
    return html+"</div>"; }

  /* ---------- vista: ordinamento, filtri, ricerca ---------- */
  function sortChildren(list){ const s=settings.sort; if(s==="manuale")return list;
    const c=list.slice();
    if(s==="priorita") c.sort((a,b)=>(PRI_ORDER[a.priority]??3)-(PRI_ORDER[b.priority]??3));
    else if(s==="scadenza") c.sort((a,b)=>{ const x=a.due?daysUntil(a.due):1e9, y=b.due?daysUntil(b.due):1e9; return x-y; });
    else if(s==="alfabetico") c.sort((a,b)=>(a.text||"").localeCompare(b.text||"","it",{sensitivity:"base"}));
    return c; }
  function nodeMatches(n){ const q=view.search.trim().toLowerCase();
    let ok=true;
    if(q){ const inText=(n.text||"").toLowerCase().includes(q); const inNote=(n.note||"").toLowerCase().includes(q);
      const inTags=(n.tags||[]).some(t=>t.toLowerCase().includes(q)); ok=inText||inNote||inTags; }
    if(ok&&view.filter==="dafare"&&n.done) ok=false;
    if(ok&&view.filter==="fatti"&&!n.done) ok=false;
    return ok; }
  function visibleSubtree(n){ if(nodeMatches(n))return true; return n.children.some(visibleSubtree); }

  /* ---------- rendering ---------- */
  const CHECK_SVG='<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>';
  const IC={ add:'<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>',
    details:'<svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h10"/></svg>',
    del:'<svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>',
    note:'<svg viewBox="0 0 24 24"><path d="M4 4h16v12l-4 4H4z"/><path d="M14 20v-4h4"/></svg>',
    clip:'<svg viewBox="0 0 24 24"><path d="M21 11l-9 9a5 5 0 0 1-7-7l9-9a3.5 3.5 0 0 1 5 5l-9 9a2 2 0 0 1-3-3l8-8"/></svg>',
    cal:'<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>',
    grip:'<svg viewBox="0 0 10 20"><circle cx="3" cy="4" r="1.4"/><circle cx="7" cy="4" r="1.4"/><circle cx="3" cy="10" r="1.4"/><circle cx="7" cy="10" r="1.4"/><circle cx="3" cy="16" r="1.4"/><circle cx="7" cy="16" r="1.4"/></svg>' };

  function hl(text){ const q=view.search.trim(); const e=esc(text||"(senza titolo)"); if(!q)return e;
    try{ return e.replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"),"<mark>$1</mark>"); }catch(_){return e;} }

  function drawerHTML(node){

  function nodeHTML(node,depth){
    if(!visibleSubtree(node))return"";
    const p=progress(node), hasKids=node.children.length>0, allDone=node.done;
    const partial=hasKids&&p.done>0&&!allDone;
    const checkCls="check"+(allDone?" on":partial?" partial":"");
    const rowCls="row"+(allDone?" done":"")+(node.color?" accent":"");
    const rowStyle=node.color?` style="--accent:${node.color}"`:"";
    const draggable=(settings.sort==="manuale"&&!view.search&&view.filter==="tutti");
    const grip=draggable?`<span class="grip" data-drag="${node.id}" title="Trascina per spostare">${IC.grip}</span>`:"";
    const toggleBtn=hasKids?`<button class="toggle${node.collapsed?" collapsed":""}" data-act="collapse" data-id="${node.id}">▾</button>`:"";
    const labelHTML=(editingId===node.id)
      ? `<input class="edit-input" data-id="${node.id}" value="${esc(node.text)}" maxlength="200" />`
      : `<span class="label" data-act="edit" data-id="${node.id}">${toggleBtn}${hl(node.text)}</span>`;
    // pills & badges
    let pills="";
    if(node.priority) pills+=`<span class="pill pri-${node.priority}">${node.priority[0].toUpperCase()+node.priority.slice(1)}</span>`;
    if(node.due){ const dc=dueClass(node.due), du=daysUntil(node.due);
      const lbl=du===0?"oggi":du===1?"domani":du<0?`${-du}g fa`:fmtDate(node.due);
      pills+=`<span class="pill due ${dc}">${IC.cal}${lbl}</span>`; }
    (node.tags||[]).slice(0,4).forEach(t=>pills+=`<span class="tag">#${esc(t)}</span>`);
    const bar=hasKids?`<div class="bar"><i style="width:${Math.round(p.done/p.total*100)}%"></i></div><span class="frac">${p.done}/${p.total}</span>`:"";
    const nb=(node.note&&node.note.trim())?`<span class="badge">${IC.note}</span>`:"";
    const ab=(node.attachments&&node.attachments.length)?`<span class="badge">${IC.clip} ${node.attachments.length}</span>`:"";
    const cb=(node.checklist&&node.checklist.length)?`<span class="badge">☑ ${node.checklist.filter(x=>x.done).length}/${node.checklist.length}</span>`:"";
    const meta=(bar||pills||nb||ab||cb)?`<div class="meta">${bar}${pills}<span class="badges" data-badges="${node.id}">${nb}${ab}${cb}</span></div>`:"";
    const noteInline=(node.note&&node.note.trim())?`<div class="note-inline" data-act="note-jump" data-id="${node.id}" title="Tocca per modificare">${linkify(node.note)}</div>`:"";
    const attInline=(node.attachments&&node.attachments.length)?`<div class="att-inline">`+node.attachments.map(a=>`<button class="attchip" data-act="att-open" data-att="${a.id}" data-name="${esc(a.name)}" title="Apri ${esc(a.name)}">${IC.clip}<span>${esc(a.name)}</span></button>`).join("")+`</div>`:"";
    const drawer=openSet.has(node.id)?drawerHTML(node):"";
    const open=openSet.has(node.id);
    const kidsList=sortChildren(node.children);
    const kids=hasKids&&!node.collapsed?`<ul>${kidsList.map(c=>nodeHTML(c,depth+1)).join("")}</ul>`:"";
    return `<li class="node${depth===0?" root":""}">
      <div class="${rowCls}"${rowStyle} data-row="${node.id}">
        ${grip}
        <button class="${checkCls}" data-act="toggle" data-id="${node.id}" title="${allDone?"Segna da fare":"Completa"}">${CHECK_SVG}</button>
        <div class="body">${labelHTML}${meta}${noteInline}${attInline}</div>
        <div class="actions">
          <button class="iconbtn" data-act="add" data-id="${node.id}" title="Aggiungi sotto-obiettivo">${IC.add}</button>
          <button class="iconbtn${open?" active":""}" data-act="details" data-id="${node.id}" title="Dettagli">${IC.details}</button>
          <button class="iconbtn del" data-act="del" data-id="${node.id}" title="Elimina">${IC.del}</button>
        </div>
      </div>${drawer}${kids}</li>`;
  }

  function render(){
    document.getElementById("treeName").value=cur.name;
    document.getElementById("sortSel").value=settings.sort;
    document.getElementById("filterSel").value=view.filter;
    const host=document.getElementById("treeHost");
    const roots=sortChildren(cur.tree).filter(visibleSubtree);
    if(!cur.tree.length){
      host.innerHTML=`<div class="empty"><div class="big">Il tuo albero è vuoto</div>Aggiungi un obiettivo qui sopra e poi ramifica con i sotto-obiettivi.</div>`;
    }else if(!roots.length){
      host.innerHTML=`<div class="empty"><div class="big">Nessun risultato</div>Nessun obiettivo corrisponde a ricerca/filtro attuali.</div>`;
    }else{
      host.innerHTML=`<ul class="tree">${roots.map(n=>nodeHTML(n,0)).join("")}</ul>`;
    }
    if(editingId){ const inp=host.querySelector(`.edit-input[data-id="${editingId}"]`); if(inp){inp.focus();inp.select();} }
    // carica thumbnail immagini per drawer aperti
    openSet.forEach(id=>{ const h=find(id); const box=document.getElementById("thumbs-"+id); if(h&&box) attThumbs(h.node).then(html=>{box.innerHTML=html;}); });
    updateOverall(); rebuildTreeSelect();
  }
  function updateBadges(id){ const h=find(id); if(!h)return; const span=document.querySelector(`[data-badges="${id}"]`); if(!span)return;
    const nb=(h.node.note&&h.node.note.trim())?`<span class="badge">${IC.note}</span>`:"";
    const ab=(h.node.attachments&&h.node.attachments.length)?`<span class="badge">${IC.clip} ${h.node.attachments.length}</span>`:"";
    const cb=(h.node.checklist&&h.node.checklist.length)?`<span class="badge">☑ ${h.node.checklist.filter(x=>x.done).length}/${h.node.checklist.length}</span>`:"";
    span.innerHTML=nb+ab+cb; }
  function updateOverall(){
    let d=0,t=0; for(const n of cur.tree){const p=progress(n);d+=p.done;t+=p.total;}
    const pct=t?Math.round(d/t*100):0, C=2*Math.PI*21;
    document.getElementById("ringFill").setAttribute("stroke-dashoffset",(C*(1-pct/100)).toFixed(1));
    document.getElementById("ringPct").textContent=pct+"%";
    const line=document.getElementById("overallLine"), sub=document.getElementById("overallSub");
    if(!cur.tree.length){line.textContent="Nessun obiettivo ancora";sub.textContent="Aggiungi il primo obiettivo qui sotto.";}
    else{ const roots=cur.tree.length, rd=cur.tree.filter(n=>n.done).length; let over=0; walkAll(cur.tree,n=>{if(n.due&&!n.done&&daysUntil(n.due)<0)over++;});
      line.textContent=`${d} di ${t} traguardi completati`;
      sub.textContent=`${roots} obiettiv${roots>1?"i":"o"} principal${roots>1?"i":"e"} · ${rd} completat${rd===1?"o":"i"}`+(over?` · ⚠ ${over} in ritardo`:""); }
  }

  function rebuildTreeSelect(){ const sel=document.getElementById("treeSelect");
    sel.innerHTML=index.trees.map(t=>`<option value="${t.id}" ${t.id===cur.id?"selected":""}>${esc(t.name)}</option>`).join(""); }

  /* ---------- condivisione / export ---------- */
  function shareText(nodes,title){ let out="🌳 "+title+"\n\n";
    const walk=(list,dep)=>{ list.forEach(n=>{ const ind="   ".repeat(dep);
      let extras=[]; if(n.priority)extras.push("priorità "+n.priority); if(n.due)extras.push("scad. "+fmtDate(n.due));
      out+=ind+(n.done?"✅":"⬜")+" "+(n.text||"(senza titolo)")+(extras.length?" ("+extras.join(", ")+")":"")+"\n";
      if(n.tags&&n.tags.length) out+=ind+"   🏷 "+n.tags.map(t=>"#"+t).join(" ")+"\n";
      if(n.note&&n.note.trim()) out+=ind+"   📝 "+n.note.replace(/\s*\n\s*/g," ").trim()+"\n";
      (n.checklist||[]).forEach(c=>out+=ind+"      "+(c.done?"☑":"☐")+" "+c.text+"\n");
      if(n.attachments&&n.attachments.length) out+=ind+"   📎 "+n.attachments.map(a=>a.name).join(", ")+"\n";
      if(n.children.length) walk(n.children,dep+1); }); };
    walk(nodes,0);
    if(collectAttIds(nodes).length) out+="\n(I documenti non sono inclusi nel messaggio: usa Stampa→PDF o Esporta.)";
    return out+"\n\n— Albero degli Obiettivi"; }
  function shareWA(nodes,title){ window.open("https://wa.me/?text="+encodeURIComponent(shareText(nodes,title)),"_blank"); }
  function shareMail(nodes,title){ window.location.href="mailto:?subject="+encodeURIComponent("Obiettivi: "+title)+"&body="+encodeURIComponent(shareText(nodes,title)); }
  async function shareCopy(nodes,title){ try{await navigator.clipboard.writeText(shareText(nodes,title));toast("Copiato");}catch(e){toast("Copia non riuscita");} }

  function toMarkdown(nodes,title){ let out="# 🌳 "+title+"\n\n";
    const walk=(list,dep)=>{ list.forEach(n=>{ const ind="  ".repeat(dep);
      let tags=(n.tags||[]).map(t=>"`#"+t+"`").join(" ");
      let meta=[]; if(n.priority)meta.push("**"+n.priority+"**"); if(n.due)meta.push("📅 "+fmtDate(n.due));
      out+=ind+"- ["+(n.done?"x":" ")+"] "+(n.text||"(senza titolo)")+(meta.length?" — "+meta.join(" · "):"")+(tags?" "+tags:"")+"\n";
      if(n.note&&n.note.trim()) out+=ind+"  > "+n.note.replace(/\n/g,"\n"+ind+"  > ")+"\n";
      (n.checklist||[]).forEach(c=>out+=ind+"  - ["+(c.done?"x":" ")+"] "+c.text+"\n");
      (n.attachments||[]).forEach(a=>out+=ind+"  - 📎 "+a.name+"\n");
      if(n.children.length) walk(n.children,dep+1); }); };
    walk(nodes,0); return out; }
  function download(name,text,mime){ const blob=new Blob([text],{type:mime}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000); }

  async function loadAttMap(nodes){ const ids=collectAttIds(nodes); const map={}; for(const id of ids){ const r=await sGet(ATT_PREFIX+id); if(r&&r.value) map[id]=r.value; } return map; }
  function printItem(n,map){ const mark=n.done?"☑":"☐"; let att="";
    (n.attachments||[]).forEach(a=>{ const data=map[a.id];
      if(data&&/^image\//.test(a.type)) att+=`<div class="p-att">📎 ${esc(a.name)}</div><img class="p-img" src="${data}">`;
      else att+=`<div class="p-att">📎 ${esc(a.name)} (${fmtSize(a.size)})</div>`; });
    let tags=[]; if(n.priority)tags.push("priorità: "+n.priority); if(n.due)tags.push("scadenza: "+fmtDate(n.due)); (n.tags||[]).forEach(t=>tags.push("#"+t));
    const tagline=tags.length?`<div class="p-tagline">${esc(tags.join("  ·  "))}</div>`:"";
    const note=(n.note&&n.note.trim())?`<div class="p-note">${esc(n.note)}</div>`:"";
    const cl=(n.checklist||[]).map(c=>`<div class="p-att">${c.done?"☑":"☐"} ${esc(c.text)}</div>`).join("");
    const dot=n.color?`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${n.color};margin-right:6px"></span>`:"";
    const kids=n.children.length?`<ul>${n.children.map(c=>printItem(c,map)).join("")}</ul>`:"";
    return `<li class="p-item"><div class="p-head"><span class="p-mark">${mark}</span>${dot}${esc(n.text)||"(senza titolo)"}</div>${tagline}${note}${cl}${att}${kids}</li>`; }
  async function printNodes(nodes,title){ toast("Preparo la stampa…"); const map=await loadAttMap(nodes);
    document.getElementById("printArea").innerHTML=`<div class="p-title">🌳 ${esc(title)}</div><div class="p-sub">Stampato il ${esc(new Date().toLocaleString("it-IT"))}</div><ul class="p-tree">${nodes.map(n=>printItem(n,map)).join("")}</ul>`;
    document.body.classList.add("printing"); window.print(); }
  window.addEventListener("afterprint",()=>{document.body.classList.remove("printing");document.getElementById("printArea").innerHTML="";});

  // PDF diretto (senza finestra di stampa) tramite html2canvas + jsPDF
  let pdfLibs=null;
  function ensurePdfLibs(){ if(pdfLibs)return pdfLibs;
    pdfLibs=new Promise((resolve,reject)=>{ let need=2; const done=()=>{ if(--need===0)resolve(); };
      const load=src=>{ const s=document.createElement("script"); s.src=src; s.onload=done; s.onerror=()=>reject(new Error(src)); document.head.appendChild(s); };
      load("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js");
      load("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"); });
    return pdfLibs; }
  async function exportPDF(nodes,title){ if(!nodes||!nodes.length){toast("Niente da esportare");return;}
    toast("Genero il PDF…");
    try{ await ensurePdfLibs(); }catch(e){ toast("Librerie PDF non raggiungibili — apro la stampa."); printNodes(nodes,title); return; }
    const map=await loadAttMap(nodes);
    const box=document.createElement("div");
    box.style.cssText="position:fixed;left:-99999px;top:0;width:794px;background:#fff;color:#1B2620;padding:34px;font-family:'Spline Sans',system-ui,sans-serif";
    box.innerHTML=`<div class="p-title">🌳 ${esc(title)}</div><div class="p-sub">${esc(new Date().toLocaleString("it-IT"))}</div><ul class="p-tree">${nodes.map(n=>printItem(n,map)).join("")}</ul>`;
    document.body.appendChild(box);
    try{
      const canvas=await window.html2canvas(box,{scale:2,backgroundColor:"#ffffff",useCORS:true});
      const JsPDF=(window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
      const pdf=new JsPDF("p","mm","a4"); const pageW=210,pageH=297;
      const imgW=pageW, imgH=canvas.height*imgW/canvas.width;
      const img=canvas.toDataURL("image/jpeg",0.92); let left=imgH, pos=0;
      pdf.addImage(img,"JPEG",0,pos,imgW,imgH); left-=pageH;
      while(left>0){ pos-=pageH; pdf.addPage(); pdf.addImage(img,"JPEG",0,pos,imgW,imgH); left-=pageH; }
      pdf.save((title||"albero").replace(/[^\w\-]+/g,"_")+".pdf"); toast("PDF salvato");
    }catch(e){ toast("PDF non riuscito — apro la stampa."); printNodes(nodes,title); }
    finally{ box.remove(); } }

  async function exportJSON(){ toast("Preparo il file…"); const map=await loadAttMap(cur.tree);
    download((cur.name||"albero").replace(/[^\w\-]+/g,"_")+".json",
      JSON.stringify({app:"albero-obiettivi",version:3,exportedAt:new Date().toISOString(),name:cur.name,tree:cur.tree,attachments:map},null,2),"application/json");
    settings.lastBackup=Date.now(); saveSettings(); updateBackupState(); toast("File esportato"); }
  async function importJSON(file){ try{ const data=JSON.parse(await file.text());
      if(!data||!Array.isArray(data.tree)) throw 0;
      if(!confirm("Importare come NUOVO albero?"))return;
      const map=data.attachments||{}; for(const id in map) await sSet(ATT_PREFIX+id,map[id]);
      const id=uid(); cur={id,name:data.name||"Albero importato",tree:data.tree.map(fill)};
      index.trees.push({id,name:cur.name}); await saveTree(); await saveIndex(); undoStack.length=0; redoStack.length=0; openSet.clear(); render(); toast("Albero importato");
    }catch(e){toast("File non valido");} }

  /* ---------- alberi multipli ---------- */
  async function newTree(name,nodes){ const id=uid(); cur={id,name:name||"Nuovo albero",tree:nodes||[]};
    index.trees.push({id,name:cur.name}); await saveTree(); await saveIndex(); undoStack.length=0;redoStack.length=0;openSet.clear(); render(); }
  async function switchTree(id){ const r=await sGet(TREE_PREFIX+id); if(!r||!r.value){toast("Albero non trovato");return;}
    const p=JSON.parse(r.value); cur={id,name:p.name||"Albero",tree:(p.tree||[]).map(fill)}; index.currentId=id; await saveIndex();
    undoStack.length=0;redoStack.length=0;openSet.clear();editingId=null; render(); }
  async function duplicateTree(){ const id=uid(); const copy=JSON.parse(JSON.stringify(cur.tree));
    // nuovi id per nodi e allegati duplicati
    const remap={}; const relabel=async ns=>{ for(const n of ns){ n.id=uid();
      for(const a of (n.attachments||[])){ const r=await sGet(ATT_PREFIX+a.id); const nid=uid(); if(r&&r.value)await sSet(ATT_PREFIX+nid,r.value); a.id=nid; }
      await relabel(n.children); } };
    await relabel(copy); await newTree(cur.name+" (copia)",copy); toast("Albero duplicato"); }
  async function deleteTree(){ if(index.trees.length<=1){toast("Deve restare almeno un albero");return;}
    if(!confirm(`Eliminare l'albero "${cur.name}"? Operazione non annullabile.`))return;
    for(const aid of collectAttIds(cur.tree)) await sDel(ATT_PREFIX+aid);
    await sDel(TREE_PREFIX+cur.id); index.trees=index.trees.filter(t=>t.id!==cur.id);
    await saveIndex(); await switchTree(index.trees[0].id); toast("Albero eliminato"); }

  // helper per costruire i modelli: n(testo,{pri,due(giorni da oggi),note,tags,checklist,kids})
  function addDays(d){ const dt=new Date(); dt.setDate(dt.getDate()+d); return dt.toISOString().slice(0,10); }
  function n(text,o){ const nd=makeNode(text); o=o||{};
    if(o.pri)nd.priority=o.pri; if(o.due!=null)nd.due=addDays(o.due); if(o.note)nd.note=o.note;
    if(o.tags)nd.tags=o.tags.slice(); if(o.checklist)nd.checklist=o.checklist.map(t=>({id:uid(),text:t,done:false}));
    if(o.kids)o.kids.forEach(k=>nd.children.push(k)); return nd; }

  const TEMPLATES=[
    // ----- Lavoro e progetti -----
    {name:"Progetto a tappe",desc:"Lavoro · pianifica, esegui, verifica — con scadenze",cat:"Lavoro",build:()=>[
      n("Nuovo progetto",{kids:[
        n("Fase 1 — Pianificazione",{due:14,pri:"alta",kids:[n("Obiettivi e ambito"),n("Risorse e responsabilità"),n("Calendario e tappe")]}),
        n("Fase 2 — Esecuzione",{due:60,kids:[n("Attività principali"),n("Punto di avanzamento settimanale")]}),
        n("Fase 3 — Verifica e chiusura",{due:90,kids:[n("Controllo qualità / test"),n("Consegna"),n("Retrospettiva: cosa migliorare")]})
      ]})]},
    // ----- Vita pratica ed eventi -----
    {name:"Viaggio",desc:"Vita pratica · prima, durante e dopo la partenza",cat:"Vita",build:()=>[
      n("Viaggio a …",{kids:[
        n("Prima della partenza",{kids:[n("Documenti e assicurazione"),n("Voli / trasporti (prenota)",{due:30,pri:"alta"}),n("Alloggio"),n("Budget e contanti")]}),
        n("Da preparare",{kids:[n("Valigia",{checklist:["Documenti","Caricabatterie","Medicine","Vestiti","Adattatore"]}),n("Copie/foto dei documenti")]}),
        n("Durante",{kids:[n("Itinerario giorno per giorno"),n("Cose da vedere"),n("Ristoranti da provare")]}),
        n("Al rientro",{kids:[n("Foto e ricordi"),n("Spese finali / rimborsi")]})
      ]})]},
    {name:"Trasloco",desc:"Vita pratica · una tabella di marcia per cambiare casa",cat:"Vita",build:()=>[
      n("Trasloco",{kids:[
        n("8 settimane prima",{due:14,kids:[n("Disdette/attivazioni (luce, gas, internet)"),n("Preventivi ditta trasloco"),n("Avvia cambio residenza")]}),
        n("2 settimane prima",{kids:[n("Imballaggio stanza per stanza"),n("Etichetta le scatole"),n("Avvisa del cambio indirizzo")]}),
        n("Giorno del trasloco",{pri:"alta",kids:[n("Kit essenziale del primo giorno"),n("Letture dei contatori"),n("Controllo stato casa")]}),
        n("Dopo",{kids:[n("Disimballa per priorità"),n("Verifica nuovi contratti attivi"),n("Aggiorna indirizzo (banca, poste, servizi)")]})
      ]})]},
    // ----- Base -----
    {name:"Vuoto",desc:"Parti da zero",cat:"Base",build:()=>[]}
  ];

  /* ---------- modelli personalizzati ("salva come modello") ---------- */
  async function saveCustomTpls(){ await sSet(CT_KEY,JSON.stringify(customTpls)); }
  function cleanForTemplate(nodes){ return nodes.map(nd=>({
    text:nd.text,done:false,collapsed:false,color:nd.color||null,note:nd.note||"",
    priority:nd.priority||null,due:nd.due||null,tags:(nd.tags||[]).slice(),
    checklist:(nd.checklist||[]).map(c=>({text:c.text,done:false})),
    attachments:[], children:cleanForTemplate(nd.children||[]) })); }
  function instantiate(nodes){ return nodes.map(nd=>{ const m=makeNode(nd.text);
    m.color=nd.color||null; m.note=nd.note||""; m.priority=nd.priority||null; m.due=nd.due||null;
    m.tags=(nd.tags||[]).slice(); m.checklist=(nd.checklist||[]).map(c=>({id:uid(),text:c.text,done:false}));
    m.children=instantiate(nd.children||[]); return m; }); }
  async function saveAsTemplate(){ if(!cur.tree.length){toast("L'albero è vuoto");return;}
    const name=(prompt("Nome del modello:",cur.name)||"").trim(); if(!name)return;
    customTpls.push({id:uid(),name,desc:"Modello personale",nodes:cleanForTemplate(cur.tree)});
    await saveCustomTpls(); toast("Modello salvato"); showTemplates(); }
  async function deleteCustomTemplate(id){ customTpls=customTpls.filter(t=>t.id!==id); await saveCustomTpls(); showTemplates(); }

  /* ---------- promemoria / scadenze ---------- */
  function upcoming(){ const list=[]; walkAll(cur.tree,n=>{ if(n.due&&!n.done){ const d=daysUntil(n.due); if(d<=7) list.push({n,d}); } });
    return list.sort((a,b)=>a.d-b.d); }
  async function enableReminders(){ if(!("Notification"in window)){ toast("Notifiche non disponibili qui — uso i promemoria in-app."); settings.reminders=false; return; }
    try{ const p=await Notification.requestPermission(); if(p==="granted"){ settings.reminders=true; saveSettings(); toast("Promemoria attivati"); checkReminders(true); }
      else{ toast("Permesso negato — resta il pannello Promemoria."); } }catch(e){ toast("Notifiche bloccate qui — uso il pannello in-app."); } }
  function checkReminders(force){ if(!settings.reminders||!("Notification"in window)||Notification.permission!=="granted")return;
    const due=upcoming().filter(x=>x.d<=1); if(!due.length&&!force)return;
    due.slice(0,3).forEach(x=>{ try{ new Notification("Obiettivo in scadenza",{body:(x.d<0?"In ritardo: ":x.d===0?"Oggi: ":"Domani: ")+x.n.text}); }catch(e){} }); }

  /* ---------- modale ---------- */
  const modalBg=document.getElementById("modalBg"), modal=document.getElementById("modal");
  function openModal(html){ modal.innerHTML=`<button class="close" data-close>✕</button>`+html; modalBg.classList.add("show"); }
  function closeModal(){ modalBg.classList.remove("show"); }
  modalBg.addEventListener("click",e=>{ if(e.target===modalBg||e.target.hasAttribute("data-close")) closeModal(); });

  function showStats(){ let total=0,done=0,over=0,soon=0,noted=0,att=0; const pri={alta:0,media:0,bassa:0};
    walkAll(cur.tree,n=>{ if(!n.children.length){total++; if(n.done)done++;} else if(n.done)done+=0;
      if(n.due&&!n.done){const d=daysUntil(n.due); if(d<0)over++; else if(d<=7)soon++;}
      if(n.note&&n.note.trim())noted++; att+=(n.attachments||[]).length; if(n.priority)pri[n.priority]++; });
    let all=0,alldone=0; walkAll(cur.tree,n=>{all++; if(n.done)alldone++;});
    const pct=all?Math.round(alldone/all*100):0;
    openModal(`<h3>Statistiche</h3><div class="stat-grid">
      <div class="stat"><div class="n">${pct}%</div><div class="l">completamento</div></div>
      <div class="stat"><div class="n">${all}</div><div class="l">obiettivi totali</div></div>
      <div class="stat"><div class="n">${alldone}</div><div class="l">completati</div></div>
      <div class="stat"><div class="n">${over}</div><div class="l">in ritardo</div></div>
      <div class="stat"><div class="n">${soon}</div><div class="l">in scadenza (7g)</div></div>
      <div class="stat"><div class="n">${noted}</div><div class="l">con note</div></div>
      <div class="stat"><div class="n">${att}</div><div class="l">documenti</div></div>
      <div class="stat"><div class="n">${pri.alta}·${pri.media}·${pri.bassa}</div><div class="l">priorità A·M·B</div></div>
    </div>`); }
  function showTemplates(){
    const builtin=TEMPLATES.map((t,i)=>`<button class="tpl" data-tpl="${i}"><b>${esc(t.name)}</b><span>${esc(t.desc)}</span></button>`).join("");
    const custom=customTpls.length
      ? `<h4 style="margin:16px 0 8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--pine-2)">I tuoi modelli</h4><div class="tpl-list">`+
        customTpls.map(t=>`<div style="position:relative"><button class="tpl" data-ct="${t.id}" style="width:100%;padding-right:38px"><b>${esc(t.name)}</b><span>${esc(t.desc)}</span></button><button class="iconbtn del" data-ctdel="${t.id}" title="Elimina modello" style="position:absolute;right:6px;top:50%;transform:translateY(-50%)">${IC.del}</button></div>`).join("")+`</div>`
      : "";
    openModal(`<h3>Nuovo albero da modello</h3>
      <button class="mini" id="saveTplBtn" style="margin-bottom:14px"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2"><path d="M5 3h11l3 3v15H5z"/><path d="M8 3v6h7"/></svg> Salva albero corrente come modello</button>
      <div class="tpl-list">${builtin}</div>${custom}`);
    modal.querySelectorAll("[data-tpl]").forEach(b=>b.addEventListener("click",()=>{ const t=TEMPLATES[+b.dataset.tpl]; closeModal(); newTree(t.name,t.build()); toast("Albero creato"); }));
    modal.querySelectorAll("[data-ct]").forEach(b=>b.addEventListener("click",()=>{ const t=customTpls.find(x=>x.id===b.dataset.ct); if(!t)return; closeModal(); newTree(t.name,instantiate(t.nodes)); toast("Albero creato"); }));
    modal.querySelectorAll("[data-ctdel]").forEach(b=>b.addEventListener("click",e=>{ e.stopPropagation(); const t=customTpls.find(x=>x.id===b.dataset.ctdel); if(t&&confirm(`Eliminare il modello "${t.name}"?`)) deleteCustomTemplate(b.dataset.ctdel); }));
    const st=document.getElementById("saveTplBtn"); if(st) st.addEventListener("click",saveAsTemplate); }
  function showReminders(){ const list=upcoming(); const has="Notification"in window;
    openModal(`<h3>Promemoria scadenze</h3>
      <p class="muted" style="margin-top:-4px">Prossime scadenze (entro 7 giorni) degli obiettivi non completati.</p>
      ${has?`<button class="chip ${settings.reminders?"on":""}" id="remToggle" style="margin-bottom:12px">${settings.reminders?"Notifiche attive":"Attiva notifiche del browser"}</button>`:`<p class="muted">Le notifiche del browser non sono disponibili in questo contesto; qui sotto trovi comunque le scadenze.</p>`}
      ${list.length?`<div class="tpl-list">`+list.map(x=>`<div class="tpl"><b>${esc(x.n.text)}</b><span>${x.d<0?("in ritardo di "+(-x.d)+"g"):x.d===0?"scade oggi":x.d===1?"scade domani":("tra "+x.d+" giorni")} · ${fmtDate(x.n.due)}</span></div>`).join("")+`</div>`:`<p class="muted">Nessuna scadenza imminente. 🎉</p>`}`);
    const rt=document.getElementById("remToggle"); if(rt) rt.addEventListener("click",()=>{ enableReminders().then(()=>{closeModal();}); }); }

  function updateBackupState(){ const el=document.getElementById("backupState"); if(!el)return;
    if(!settings.lastBackup){ el.textContent="Nessun backup su file — usa Esporta"; return; }
    const days=Math.floor((Date.now()-settings.lastBackup)/86400000);
    el.textContent="Ultimo backup: "+(days<=0?"oggi":days+"g fa")+(days>=7?" — conviene esportare":""); }

  /* ---------- eventi ---------- */
  document.getElementById("addRoot").addEventListener("click",()=>{ const i=document.getElementById("rootInput"); addRoot(i.value); i.value=""; i.focus(); });
  document.getElementById("rootInput").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("addRoot").click(); });

  const nameEl=document.getElementById("treeName");
  nameEl.addEventListener("input",()=>{ cur.name=nameEl.value.trim()||"Il mio albero"; scheduleSave(); });
  nameEl.addEventListener("blur",()=>{ nameEl.value=cur.name; });

  document.getElementById("treeSelect").addEventListener("change",e=>switchTree(e.target.value));
  document.getElementById("search").addEventListener("input",e=>{ view.search=e.target.value; render(); });
  document.getElementById("sortSel").addEventListener("change",e=>{ settings.sort=e.target.value; saveSettings(); render(); });
  document.getElementById("filterSel").addEventListener("change",e=>{ view.filter=e.target.value; render(); });

  document.querySelector("header").addEventListener("click",e=>{ const g=e.target.closest("[data-g]"); if(!g)return; const a=g.dataset.g;
    if(a==="tree-new") newTree("Nuovo albero",[]);
    else if(a==="tree-tpl") showTemplates();
    else if(a==="tree-dup") duplicateTree();
    else if(a==="tree-del") deleteTree();
    else if(a==="expand"){ walkAll(cur.tree,n=>n.collapsed=false); commit(); }
    else if(a==="collapse"){ cur.tree.forEach(n=>{ if(n.children.length)n.collapsed=true; }); walkAll(cur.tree,n=>{ if(n.children.length)n.collapsed=true; }); commit(); }
    else if(a==="undo") undo(); else if(a==="redo") redo();
    else if(a==="stats") showStats();
    else if(a==="theme"){ settings.dark=!settings.dark; applyTheme(); saveSettings(); }
    else if(a==="share-wa") shareWA(cur.tree,cur.name);
    else if(a==="share-mail") shareMail(cur.tree,cur.name);
    else if(a==="print"){ if(!cur.tree.length){toast("Niente da stampare");return;} printNodes(cur.tree,cur.name); }
    else if(a==="pdf") exportPDF(cur.tree,cur.name);
    else if(a==="md"){ if(!cur.tree.length){toast("Niente da esportare");return;} download((cur.name||"albero").replace(/[^\w\-]+/g,"_")+".md",toMarkdown(cur.tree,cur.name),"text/markdown"); toast("Markdown esportato"); }
    else if(a==="export"){ if(!cur.tree.length){toast("Niente da esportare");return;} exportJSON(); }
    else if(a==="import") document.getElementById("importInput").click();
    else if(a==="reminders") showReminders();
  });

  document.getElementById("fileInput").addEventListener("change",e=>{ const f=e.target.files&&e.target.files[0]; if(f&&pendingAttId) addAttachment(pendingAttId,f); e.target.value=""; pendingAttId=null; });
  document.getElementById("importInput").addEventListener("change",e=>{ const f=e.target.files&&e.target.files[0]; if(f) importJSON(f); e.target.value=""; });

  const host=document.getElementById("treeHost");
  host.addEventListener("click",e=>{ if(e.target.closest("a"))return; const el=e.target.closest("[data-act]"); if(!el)return;
    const id=el.dataset.id, act=el.dataset.act; const one=()=>{const h=find(id);return h?[h.node]:[];}; const ttl=()=>{const h=find(id);return h?(h.node.text||"Obiettivo"):"Obiettivo";};
    if(act==="toggle") toggle(id);
    else if(act==="add") addChild(id);
    else if(act==="del") remove(id);
    else if(act==="collapse"){ e.stopPropagation(); toggleCollapse(id); }
    else if(act==="edit"){ editingId=id; render(); }
    else if(act==="details") toggleDetails(id);
    else if(act==="note-jump"){ openSet.add(id); const h=find(id); if(h)h.node._editNote=true; render(); const ta=host.querySelector(`textarea.note[data-id="${id}"]`); if(ta){ta.focus();} }
    else if(act==="pdf") exportPDF(one(),ttl());
    else if(act==="color") setField(id,"color",el.dataset.color||null);
    else if(act==="note-edit"){ const h=find(id); h.node._editNote=true; render(); const ta=host.querySelector(`textarea.note[data-id="${id}"]`); if(ta){ta.focus();} }
    else if(act==="note-save"){ const h=find(id); delete h.node._editNote; render(); }
    else if(act==="cl-toggle") clToggle(id,el.dataset.cid);
    else if(act==="cl-del") clDel(id,el.dataset.cid);
    else if(act==="tag-del") tagDel(id,el.dataset.tag);
    else if(act==="att-add"){ pendingAttId=id; document.getElementById("fileInput").click(); }
    else if(act==="att-open") openAttachment(el.dataset.att,el.dataset.name);
    else if(act==="att-del") removeAttachment(id,el.dataset.att);
    else if(act==="mv-up") moveSibling(id,-1); else if(act==="mv-down") moveSibling(id,1);
    else if(act==="mv-in") indent(id); else if(act==="mv-out") outdent(id);
    else if(act==="n-wa") shareWA(one(),ttl()); else if(act==="n-mail") shareMail(one(),ttl());
    else if(act==="n-copy") shareCopy(one(),ttl()); else if(act==="n-print") printNodes(one(),ttl());
  });
  // nota: salvataggio live senza re-render
  host.addEventListener("input",e=>{ const el=e.target;
    if(el.classList.contains("note")){ const h=find(el.dataset.id); if(h){ if(h.node.note!==el.value){ /*snapshot leggero al primo carattere*/ } h.node.note=el.value; scheduleSave(); updateBadges(el.dataset.id); } } });
  // tag & checklist add via Invio
  host.addEventListener("keydown",e=>{ const el=e.target;
    if(el.classList.contains("edit-input")){ if(e.key==="Enter"){e.preventDefault();rename(el.dataset.id,el.value);} else if(e.key==="Escape"){editingId=null;render();} }
    else if(el.dataset&&el.dataset.act==="tag-add"&&e.key==="Enter"){ e.preventDefault(); tagAdd(el.dataset.id,el.value); }
    else if(el.dataset&&el.dataset.act==="cl-add"&&e.key==="Enter"){ e.preventDefault(); clAdd(el.dataset.id,el.value); }
  });
  host.addEventListener("change",e=>{ const el=e.target; if(!el.dataset)return;
    if(el.dataset.act==="set-pri") setField(el.dataset.id,"priority",el.value||null);
    else if(el.dataset.act==="set-due") setField(el.dataset.id,"due",el.value||null); });
  host.addEventListener("blur",e=>{ if(e.target.classList&&e.target.classList.contains("edit-input")) rename(e.target.dataset.id,e.target.value); },true);

  // drag & drop (mouse + touch, basato su Pointer Events)
  let drag=null;
  function clearDrops(){ document.querySelectorAll(".drop-before,.drop-after,.drop-inside").forEach(x=>x.classList.remove("drop-before","drop-after","drop-inside")); }
  function rowUnder(x,y){ const el=document.elementFromPoint(x,y); return el&&el.closest?el.closest("[data-row]"):null; }
  host.addEventListener("pointerdown",e=>{ const g=e.target.closest("[data-drag]"); if(!g)return;
    if(e.pointerType==="mouse"&&e.button!==0)return; drag={id:g.dataset.drag,sx:e.clientX,sy:e.clientY,active:false}; });
  window.addEventListener("pointermove",e=>{ if(!drag)return;
    if(!drag.active){ if(Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy)<8)return;
      drag.active=true; const row=host.querySelector(`[data-row="${drag.id}"]`); if(row)row.classList.add("dragging");
      const h=find(drag.id); const fl=document.createElement("div"); fl.className="drag-float"; fl.textContent=h?(h.node.text||"Obiettivo"):"";
      document.body.appendChild(fl); drag.float=fl; document.body.style.userSelect="none"; }
    e.preventDefault();
    drag.float.style.left=(e.clientX+12)+"px"; drag.float.style.top=(e.clientY+14)+"px";
    clearDrops(); const row=rowUnder(e.clientX,e.clientY); if(!row)return; const tid=row.dataset.row;
    if(tid===drag.id||isDescendant(drag.id,tid))return;
    const r=row.getBoundingClientRect(); const yy=(e.clientY-r.top)/r.height;
    row.classList.add(yy<.28?"drop-before":yy>.72?"drop-after":"drop-inside");
  },{passive:false});
  function endDrag(e){ if(!drag)return; const d=drag; drag=null;
    if(d.active){ const row=e?rowUnder(e.clientX,e.clientY):null;
      if(row){ const tid=row.dataset.row; const pos=row.classList.contains("drop-before")?"before":row.classList.contains("drop-after")?"after":row.classList.contains("drop-inside")?"inside":null;
        if(pos) moveNode(d.id,tid,pos); }
      if(d.float)d.float.remove(); document.body.style.userSelect=""; }
    clearDrops(); host.querySelectorAll(".dragging").forEach(x=>x.classList.remove("dragging")); }
  window.addEventListener("pointerup",endDrag);
  window.addEventListener("pointercancel",()=>endDrag(null));

  // scorciatoie
  document.addEventListener("keydown",e=>{ const tag=(e.target.tagName||"").toLowerCase(); const typing=tag==="input"||tag==="textarea";
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){ e.preventDefault(); e.shiftKey?redo():undo(); }
    else if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="y"){ e.preventDefault(); redo(); }
    else if(e.key==="/"&&!typing){ e.preventDefault(); document.getElementById("search").focus(); }
    else if(e.key==="Escape"){ if(modalBg.classList.contains("show"))closeModal(); else if(editingId){editingId=null;render();} } });

  function applyTheme(){ document.documentElement.setAttribute("data-theme",settings.dark?"dark":"light"); }

  /* ---------- avvio ---------- */
  async function cleanupOrphans(){ const used=new Set(); for(const t of index.trees){ const r=await sGet(TREE_PREFIX+t.id);
      if(r&&r.value){ try{ collectAttIds(JSON.parse(r.value).tree||[]).forEach(id=>used.add(id)); }catch(e){} } }
    for(const k of await sList(ATT_PREFIX)){ const id=k.slice(ATT_PREFIX.length); if(!used.has(id)) await sDel(k); } }

  async function init(){
    const s=await sGet(SET_KEY); if(s&&s.value){ try{ settings=Object.assign(settings,JSON.parse(s.value)); }catch(e){} }
    const ct=await sGet(CT_KEY); if(ct&&ct.value){ try{ customTpls=JSON.parse(ct.value)||[]; }catch(e){ customTpls=[]; } }
    if(settings.sort) view.sort=settings.sort; applyTheme();
    const ix=await sGet(IDX_KEY);
    if(ix&&ix.value){ try{ index=JSON.parse(ix.value); }catch(e){ index={currentId:null,trees:[]}; } }
    // migrazione da versioni precedenti (v1/v2 monoalbero)
    if(!index.trees||!index.trees.length){
      const legacy=await sGet("albero-obiettivi:v2"); const legacy1=await sGet("albero-obiettivi:v1");
      let name="Il mio albero", tree=[];
      if(legacy&&legacy.value){ try{ const p=JSON.parse(legacy.value); name=p.name||name; tree=(p.tree||[]).map(fill); }catch(e){} }
      else if(legacy1&&legacy1.value){ try{ tree=(JSON.parse(legacy1.value)||[]).map(fill); }catch(e){} }
      const id=uid(); cur={id,name,tree}; index={currentId:id,trees:[{id,name}]}; await saveTree(); await saveIndex();
    }else{
      const startId=index.currentId&&index.trees.some(t=>t.id===index.currentId)?index.currentId:index.trees[0].id;
      const r=await sGet(TREE_PREFIX+startId);
      if(r&&r.value){ const p=JSON.parse(r.value); cur={id:startId,name:p.name||"Albero",tree:(p.tree||[]).map(fill)}; }
      else { cur={id:startId,name:(index.trees.find(t=>t.id===startId)||{}).name||"Albero",tree:[]}; }
      index.currentId=startId;
    }
    await cleanupOrphans(); updateBackupState(); render();
    checkReminders(false); setInterval(()=>checkReminders(false),3600000);
  }
  init();
})();
</script>
